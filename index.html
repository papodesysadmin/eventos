<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papo de Sysadmin — Eventos 2026</title>
  <script data-cfasync="false" src="assets/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0a0a0f', 800: '#0f0f14', 700: '#1a1a24', 600: '#22222e', 500: '#2a2a3a' },
            accent: { DEFAULT: '#4CAF50', light: '#66BB6A' },
            presence: '#FF6B00',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="description" content="Calendário de eventos de tecnologia do Papo de Sysadmin — confira onde estaremos em 2026." />
  <meta property="og:title" content="Papo de Sysadmin — Eventos 2026" />
  <meta property="og:description" content="Calendário de eventos de tecnologia do Papo de Sysadmin — confira onde estaremos em 2026." />
  <meta property="og:image" content="assets/logo-papo.png" />
  <meta property="og:url" content="https://eventos.papodesysadmin.org/" />
  <style>
    .cal-cell { min-height: 120px; }
    @media (min-width: 768px) { .cal-cell { min-height: 140px; } }
    .event-chip { writing-mode: horizontal-tb; }
    .modal-backdrop { backdrop-filter: blur(6px); }
  </style>
</head>
<body class="bg-dark-800 text-white font-sans min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-dark-900/90 backdrop-blur-md border-b border-dark-500">
    <nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="#" class="flex items-center gap-2">
        <img src="assets/logo-papo.png" alt="Papo de Sysadmin" class="h-9 invert">
      </a>
      <div class="flex items-center gap-3">
        <a href="https://www.youtube.com/papodesysadmin" target="_blank" rel="noopener" aria-label="YouTube" class="text-gray-400 hover:text-accent transition-colors p-2">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </a>
        <a href="https://www.linkedin.com/company/11817420" target="_blank" rel="noopener" aria-label="LinkedIn" class="text-gray-400 hover:text-accent transition-colors p-2">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <a href="admin.html" class="bg-accent hover:bg-accent-light text-white text-sm font-semibold px-4 py-2 rounded-full transition-all hover:-translate-y-0.5">+ Adicionar Evento</a>
      </div>
    </nav>
  </header>

  <!-- Hero -->
  <section class="text-center py-12 px-4 bg-gradient-to-b from-dark-700 to-dark-800 border-b border-dark-500">
    <span class="inline-block bg-accent text-white text-xs font-bold tracking-widest px-4 py-1.5 rounded-full mb-4">CALENDÁRIO 2026</span>
    <h1 class="text-3xl md:text-5xl font-extrabold leading-tight mb-3">Eventos de Tecnologia<br>e Infraestrutura</h1>
    <p class="text-gray-400 text-lg mb-6">Confira onde o Papo de Sysadmin estará presente este ano</p>
    <div class="flex justify-center gap-10">
      <div class="text-center">
        <div class="text-3xl font-extrabold text-accent" id="total-count">0</div>
        <div class="text-sm text-gray-400">eventos</div>
      </div>
      <div class="text-center">
        <div class="text-3xl font-extrabold text-presence" id="presenca-count">0</div>
        <div class="text-sm text-gray-400">presença confirmada</div>
      </div>
    </div>
  </section>

  <!-- Filters -->
  <section class="sticky top-[57px] z-40 bg-dark-900/95 backdrop-blur-md border-b border-dark-500 py-3">
    <div class="max-w-6xl mx-auto px-4 flex flex-wrap items-center gap-3">
      <div class="flex gap-1 bg-dark-700 rounded-lg p-1">
        <button class="view-btn active px-3 py-1.5 rounded-md text-sm font-medium transition-all" data-view="calendar">📅 Calendário</button>
        <button class="view-btn px-3 py-1.5 rounded-md text-sm font-medium transition-all" data-view="list">📋 Lista</button>
      </div>
      <div class="flex gap-2 flex-wrap flex-1 overflow-x-auto" id="category-filters"></div>
      <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-400 whitespace-nowrap">
        <input type="checkbox" id="presence-filter" class="hidden peer">
        <span class="peer-checked:text-presence peer-checked:font-semibold transition-colors">🎯 Presença confirmada</span>
      </label>
    </div>
  </section>

  <!-- Calendar Navigation -->
  <div class="max-w-6xl mx-auto px-4 pt-6 pb-2 flex items-center justify-center gap-6" id="calendar-nav">
    <button id="prev-month" class="w-10 h-10 rounded-full bg-dark-700 border border-dark-500 flex items-center justify-center hover:bg-accent hover:border-accent transition-all text-white">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2 class="text-2xl font-bold min-w-[220px] text-center" id="cal-month-title">Janeiro 2026</h2>
    <button id="next-month" class="w-10 h-10 rounded-full bg-dark-700 border border-dark-500 flex items-center justify-center hover:bg-accent hover:border-accent transition-all text-white">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 pb-12">
    <div id="notice" class="text-center py-8 text-gray-400"></div>
    <div id="events-container"></div>
  </main>

  <!-- Modal -->
  <div class="fixed inset-0 bg-black/70 modal-backdrop z-[1000] flex items-center justify-center p-4" id="modal-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
    <div class="bg-dark-700 border border-dark-500 rounded-xl p-6 max-w-lg w-full max-h-[80vh] overflow-y-auto" id="modal-content"></div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-dark-500 text-center text-gray-500 text-sm py-6 mt-8">
    <p>Papo de Sysadmin — Calendário de Eventos 2026</p>
    <p class="text-xs mt-1">Licenciado sob <a href="http://creativecommons.org/licenses/by-nc/4.0/" class="text-accent hover:underline">CC BY-NC 4.0</a></p>
  </footer>

  <script data-cfasync="false" src="main.js"></script>
</body>
</html>
