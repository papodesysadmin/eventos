<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papo de Sysadmin — Eventos 2026</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="Calendário de eventos de tecnologia do Papo de Sysadmin — confira onde estaremos em 2026." />
  <meta property="og:title" content="Papo de Sysadmin — Eventos 2026" />
  <meta property="og:description" content="Calendário de eventos de tecnologia do Papo de Sysadmin — confira onde estaremos em 2026." />
  <meta property="og:image" content="assets/logo-papo.png" />
  <meta property="og:url" content="https://eventos.papodesysadmin.org/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Papo de Sysadmin — Eventos 2026" />
  <meta name="twitter:description" content="Calendário de eventos de tecnologia do Papo de Sysadmin — confira onde estaremos em 2026." />
  <meta name="twitter:image" content="assets/logo-papo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <nav class="nav">
      <a href="#" class="nav-brand">
        <img src="assets/logo-papo.png" alt="Papo de Sysadmin" class="nav-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';">
        <span class="nav-logo-fallback" style="display:none;">Papo de Sysadmin</span>
      </a>
      <div class="nav-right">
        <div class="nav-links">
          <a href="https://www.youtube.com/papodesysadmin" target="_blank" rel="noopener" aria-label="YouTube">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          </a>
          <a href="https://www.linkedin.com/company/11817420" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          </a>
        </div>
        <a href="admin.html" class="btn-admin">+ Adicionar Evento</a>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <span class="hero-badge">CALENDÁRIO 2026</span>
      <h1>Eventos de Tecnologia<br>e Infraestrutura</h1>
      <p class="hero-subtitle">Confira onde o Papo de Sysadmin estará presente este ano</p>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-number" id="total-count">0</span>
          <span class="stat-label">eventos</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="presenca-count">0</span>
          <span class="stat-label">com presença confirmada</span>
        </div>
      </div>
    </div>
  </section>

  <!-- View Toggle + Filters -->
  <section class="filters-section">
    <div class="container">
      <div class="filters-row">
        <div class="view-toggle">
          <button class="view-btn active" data-view="calendar" title="Calendário">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </button>
          <button class="view-btn" data-view="list" title="Lista">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          </button>
        </div>
        <div class="filter-group" id="category-filters"></div>
        <div class="filter-presence">
          <label class="presence-toggle" for="presence-filter">
            <input type="checkbox" id="presence-filter">
            <span class="toggle-label">🎯 Presença confirmada</span>
          </label>
        </div>
      </div>
    </div>
  </section>

  <!-- Calendar Navigation -->
  <section class="calendar-nav" id="calendar-nav">
    <div class="container">
      <button class="cal-nav-btn" id="prev-month">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h2 class="cal-month-title" id="cal-month-title">Janeiro 2026</h2>
      <button class="cal-nav-btn" id="next-month">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </section>

  <!-- Main Content -->
  <main class="container">
    <div id="notice" class="notice"></div>
    <div id="events-container"></div>
  </main>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Papo de Sysadmin — Calendário de Eventos de Tecnologia 2026</p>
      <p class="footer-license">Licenciado sob <a href="http://creativecommons.org/licenses/by-nc/4.0/" rel="license">CC BY-NC 4.0</a></p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
