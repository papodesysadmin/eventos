server {
    listen 80;
    listen [::]:80;
    server_name eventos.papodesysadmin.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name eventos.papodesysadmin.org;

    ssl_certificate /etc/ssl/certs/eventos-origin.crt;
    ssl_certificate_key /etc/ssl/private/eventos-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/eventos;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ ^/(cli|\.git|\.kiro|\.github|api) {
        deny all;
        return 404;
    }

    # API de extração de eventos (proxy para Node.js na porta 3002)
    location = /api/extract {
        proxy_pass http://127.0.0.1:3002/extract;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 35s;
        proxy_connect_timeout 5s;

        # Limitar tamanho do body (só precisa da URL)
        client_max_body_size 1k;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
